### mavlink joy bridge config ###
mavlink_joy_bridge:
  ros__parameters:
    listen_address: "0.0.0.0"
    listen_port: 14550
    remote_ip_filter: ""
    publish_rate_hz: 50.0
    link_timeout_ms: 500
    joy_topic: "/joy"
    joy_profile: "zorro"
    mode_from_mavlink: true
    mode_default: 0.0
    mode_channel_src: 7
    mode_positions: [-1.0, 0.0, 1.0]
    channel_map:
      - "0,axes,1,-1.0,0.05"
      - "1,axes,0,1.0,0.05"
      - "2,axes,2,-1.0,0.05"
      - "3,axes,3,1.0,0.05"
